name: Export and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export:
    name: Godot Web Export
    runs-on: ubuntu-latest
    env:
      GODOT_TAG: "4.6.1-stable"
      # Godot's template folder uses dots, not dashes: 4.6.1.stable
      GODOT_TEMPLATES_DIR: "4.6.1.stable"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_TAG }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_TAG }}/Godot_v${{ env.GODOT_TAG }}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv "Godot_v${{ env.GODOT_TAG }}_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_TEMPLATES_DIR }}
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_TAG }}/Godot_v${{ env.GODOT_TAG }}_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_TEMPLATES_DIR }}/

      - name: Export for Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html 2>&1

      - name: Add .nojekyll
        run: touch build/web/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: ${{ github.sha }}"
